name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs>=1.6.0 mkdocs-material>=9.5.0 mkdocs-jupyter>=0.25.0

      - name: Sync notebooks to docs
        run: |
          rm -rf docs/notebooks
          cp -r notebooks docs/

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
